[env:wt32-sc01]
platform = espressif32
board = esp-wrover-kit
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.partitions = partitions.csv
lib_deps =
    lovyanGFX@^1.1.16
    bblanchon/ArduinoJson@^7.0.0
build_src_flags = -w
